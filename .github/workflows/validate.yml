name: validate

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Catch regressions from upstream HA / HACS changes.
    - cron: "0 4 * * 1"
  workflow_dispatch:

jobs:
  hassfest:
    name: HA hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration

  py-compile:
    name: Python compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Byte-compile sources
        run: python -m compileall -q custom_components/ipp_print
